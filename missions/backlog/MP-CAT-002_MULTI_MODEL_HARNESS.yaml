mission_id: MP-CAT-002
title: Multi-Model Coding Harness MVP
level: M3
status: approved
owner: Human Owner
priority: 3
risk_level: medium
reversibility: high
autonomy_level: L3
confidence_minimum: 75
created: "2026-06-17"
last_updated: "2026-06-17"
objective: >-
  Build the first working budget-aware multi-model task loop:
  ticket -> local worker patch -> tests -> cheap review -> Opus final review,
  with model routing that uses GPT for architecture, Opus for specs and review,
  and Kimi/MiniMax (Ollama Cloud) for implementation.
background: >-
  The harness is defined externally in .agent/project_state.md as a lightweight
  ticket/worker model. Per Human Owner direction (2026-06-17) it is governed as a
  CAT mission so that model choice stays routing, not authority: missions and BEADs
  define what may change, models perform roles inside that authority. The MVP proves
  one end-to-end loop while minimizing Opus calls and requiring human approval before
  any merge.
scope:
  in:
    - Model route config mapping roles to models (T001)
    - Worker prompt template with objective, constraints, and output schema (T002)
    - First local worker patch generated by Kimi/MiniMax with tests run (T003)
    - Final review packet format for Opus review (T004)
  out:
    - Automatic merge or commit of worker patches
    - GitHub API or CI integration
    - Swarm/parallel multi-worker execution
    - Secret or credential management
    - Production deployment
allowed_paths:
  - .agent/**
  - scripts/harness_run.py
  - scripts/harness_demo.py
  - tests/**
  - schemas/**
  - evidence/**
  - state/**
  - learnings/**
forbidden_paths:
  - .env
  - .env.*
  - infra/prod/**
  - secrets/**
  - credentials/**
dependencies:
  - MP-CAT-000
acceptance_criteria:
  - agents/model_routes.yaml exists and maps architecture, specs, review, cheap_review, and implementation roles to concrete models.
  - prompts/WORKER_PROMPT_TEMPLATE.md contains an objective section, a constraints section, and a machine-readable output schema.
  - A worker model (Kimi or MiniMax) generates a patch for a defined sample task and the test suite is executed against it.
  - playbooks/REVIEW_PACKET_TEMPLATE.md defines the final-review packet format consumed by the Opus review step.
  - No worker patch is merged without explicit Human Owner approval.
  - All four BEADs validate against the CAT schemas.
success_metrics:
  - cat_validate.py --all passes with the four new BEADs present
  - One end-to-end loop runs without manual model-call edits
  - Opus is invoked at most once per ticket (final review only)
  - Failed worker tasks stop after at most 2 retries
required_validation:
  - type: schema_validation
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/mp_cat_002_schema_validation.md
    required: true
  - type: tests
    command: pytest -q
    evidence_path: evidence/test-results/mp_cat_002_demo_tests.txt
    required: true
rollback:
  required: true
  plan: >-
    Remove agents/model_routes.yaml, prompts/WORKER_PROMPT_TEMPLATE.md,
    playbooks/REVIEW_PACKET_TEMPLATE.md, scripts/harness_demo.py and the four
    MP-CAT-002 BEAD files, and revert the MISSION_REGISTRY.yaml entry.
human_gate:
  required: true
  approver: Human Owner
tool_budget:
  search: 4
  read: 30
  write: 20
  execute: 12
  max_runtime_minutes: 90
beads:
  - bead_id: BEAD-CAT-002-001
    title: Create model route config
    status: queued
  - bead_id: BEAD-CAT-002-002
    title: Create worker prompt template
    status: queued
  - bead_id: BEAD-CAT-002-003
    title: Run first local worker patch
    status: queued
  - bead_id: BEAD-CAT-002-004
    title: Create final review packet format
    status: queued
  - bead_id: BEAD-CAT-002-005
    title: Relocate durable harness evidence into the evidence plane
    status: queued
evidence_requirements:
  - model_routes_config
  - worker_prompt_template
  - worker_patch_and_test_output
  - review_packet_template
notes:
  - Source of truth for the harness intent is .agent/project_state.md (Human Owner).
  - Constraints map to gates - no merge without human approval, workers touch only ticket-listed paths, 2-retry cap, destructive actions need approval.
  - Minimize Opus calls - Opus is the specs/review role only; cheap_review runs first.

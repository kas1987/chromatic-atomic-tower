mission_id: MP-CAT-005
title: Multi-Model Coding Harness MVP
level: M3
status: approved
owner: Human Owner
priority: 1
risk_level: medium
reversibility: high
autonomy_level: L3
confidence_minimum: 75
created: "2026-06-17"
last_updated: "2026-06-17"
objective: >-
  Prove one end-to-end budget-aware multi-model task loop:
  ticket -> local worker patch -> tests -> cheap review -> Opus final review,
  with model routing that uses GPT for architecture, Opus for specs and review,
  and Kimi/MiniMax (Ollama Cloud) for implementation.
background: >-
  The harness is governed as a CAT mission so that model choice stays routing,
  not authority: missions and BEADs define what may change, models perform roles
  inside that authority. Source of truth for harness intent: .agent/project_state.md.
  Note: promoted from backlog as MP-CAT-002 (collision with closed Evidence Gate
  mission); renumbered to MP-CAT-005. Most deliverables were pre-built in earlier
  sessions and need verification + evidence recording.
scope:
  in:
    - agents/model_routes.yaml — role-to-model mapping (verify + commit)
    - prompts/WORKER_PROMPT_TEMPLATE.md — worker prompt template (verify + commit)
    - harness_demo.py worker patch + test run evidence
    - playbooks/REVIEW_PACKET_TEMPLATE.md — final review packet format (verify + commit)
    - evidence relocation from .agent/ into evidence/ plane
  out:
    - Automatic merge or commit of worker patches
    - GitHub API or CI integration
    - Swarm/parallel multi-worker execution
    - Secret or credential management
    - Production deployment
allowed_paths:
  - .agent/**
  - agents/**
  - prompts/**
  - playbooks/**
  - scripts/harness_run.py
  - scripts/harness_demo.py
  - tests/**
  - schemas/**
  - evidence/**
  - state/**
  - learnings/**
forbidden_paths:
  - .env
  - .env.*
  - infra/prod/**
  - secrets/**
  - credentials/**
dependencies:
  - MP-CAT-000
acceptance_criteria:
  - agents/model_routes.yaml exists and maps architecture, specs, review, cheap_review, and implementation roles to concrete models.
  - prompts/WORKER_PROMPT_TEMPLATE.md contains an objective section, a constraints section, and a machine-readable output schema.
  - A worker model (Kimi or MiniMax) generates a patch for a defined sample task and the test suite passes.
  - playbooks/REVIEW_PACKET_TEMPLATE.md defines the final-review packet format consumed by the Opus review step.
  - No worker patch is merged without explicit Human Owner approval.
  - All five BEADs validate against the CAT schemas.
success_metrics:
  - cat_validate.py --all passes with the five new BEADs present
  - harness_demo.py tests pass (worker patch verified)
  - Opus is invoked at most once per ticket (final review only)
  - Failed worker tasks stop after at most 2 retries
required_validation:
  - type: schema_validation
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/mp_cat_005_schema_validation.md
    required: true
  - type: tests
    command: pytest -q
    evidence_path: evidence/test-results/mp_cat_005_demo_tests.txt
    required: true
rollback:
  required: true
  plan: >-
    Remove agents/model_routes.yaml, prompts/WORKER_PROMPT_TEMPLATE.md,
    playbooks/REVIEW_PACKET_TEMPLATE.md, scripts/harness_demo.py and the five
    MP-CAT-005 BEAD files, and revert the MISSION_REGISTRY.yaml entry.
human_gate:
  required: true
  approver: Human Owner
tool_budget:
  search: 4
  read: 30
  write: 20
  execute: 12
  max_runtime_minutes: 90
beads:
  - bead_id: BEAD-CAT-005-001
    title: Verify and commit model route config
  - bead_id: BEAD-CAT-005-002
    title: Verify and commit worker prompt template
  - bead_id: BEAD-CAT-005-003
    title: Record worker patch and test evidence
  - bead_id: BEAD-CAT-005-004
    title: Verify and commit review packet template
  - bead_id: BEAD-CAT-005-005
    title: Relocate durable harness evidence into evidence plane
evidence_requirements:
  - model_routes_config
  - worker_prompt_template
  - worker_patch_and_test_output
  - review_packet_template
  - harness_evidence_relocation
notes:
  - Source of truth for harness intent is .agent/project_state.md (Human Owner).
  - Most artifacts pre-exist; BEADs verify, record evidence, and commit.
  - Minimize Opus calls — Opus is the specs/review role only; cheap_review runs first.
  - Workers touch only ticket-listed paths; 2-retry cap; destructive actions need approval.

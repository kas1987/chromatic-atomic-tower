mission_id: MP-CAT-A007-4C01
title: LOGHOUSE Log Intelligence and Architecture Drift MVP
level: M4
status: draft
owner: Human Owner
priority: 2
risk_level: high
reversibility: high
autonomy_level: L2
confidence_minimum: 70
created: "2026-06-17"
last_updated: "2026-06-17"
id_convention:
  scheme: "MP-<repo>-<tier><NNN>-<cx>C<oo>"
  type: MP (Mission Pack)
  repo: CAT (Chromatic Atomic Tower)
  priority_tier: A
  priority_tier_frozen_at_creation: true
  global_mission_number: "007"
  complexity: 4
  relative_execution_order: "01"
  note: >-
    Priority tier is frozen at creation and never renamed; live priority is the
    mutable `priority` field. Second mission to adopt the Type-Repo-Priority-Complexity
    ID convention introduced with MP-CAT-A006-4C01.
objective: >-
  Build LOGHOUSE: a local-first, evidence-first log intelligence and architecture drift
  MVP inside Chromatic Atomic Tower. LOGHOUSE consumes logs, metrics, traces, deploy
  events, Git metadata, and dependency graphs, normalizes them into a canonical telemetry
  envelope, correlates signals, and emits audit-ready findings with evidence, confidence,
  suggested fixes, and agent-routable dispatch-queue items. It classifies architecture
  drift (intentional vs accidental vs blocked vs unknown) and fails CI when critical
  architecture rules are violated.
background: >-
  Sourced from the external log-intel-mission-pack (Log Intelligence & Architecture Drift)
  and reconciled with the pre-existing LOGHOUSE Phase-1 slice already present in the repo
  (docs/operations/LOGHOUSE_FOUNDATION.md plus the telemetry_envelope, finding,
  dependency_edge, and deploy_event schemas with tests/test_loghouse_schemas.py). Rather
  than duplicate those contracts, MP-CAT-A007-4C01 ADOPTS the LOGHOUSE schemas as the
  Phase-1 baseline and extends them with the dispatch queue, architecture-rule, and drift
  report contracts, a deterministic findings engine, dependency/drift detection, telemetry
  intake configs, CI enforcement, agent/LLM observability, and operational docs. This is
  the second mission under the Type-Repo-Priority-Complexity ID convention; shipped
  missions MP-CAT-000..005 keep their legacy IDs.
scope:
  in:
    - Canonical contracts (extend LOGHOUSE Phase-1 schemas) for telemetry, findings, deploys, dependency edges, dispatch queue items, architecture rules, and drift reports.
    - Deterministic findings engine — event normalizer, correlation, rule set, JSON and Markdown finding generator, dispatch-queue writer.
    - Dependency graph generation and architecture-drift detection with intentional/accidental/blocked/unknown classification.
    - Telemetry intake configuration templates (OpenTelemetry Collector, Vector/Fluent Bit) with required-attribute enrichment.
    - CI/CD workflow that validates schemas, runs the engine on fixtures, and gates the build on critical architecture-rule violations.
    - Agent/LLM observability hooks and an agent-drift finding type.
    - Validation script, pytest coverage, golden fixtures, Mermaid diagrams, runbooks, dispatch board, and learning closeout.
  out:
    - Standing up a production observability backend (OpenObserve/SigNoz) or any live deployment.
    - Auto-remediation of production systems or auto-created PRs from findings.
    - Secrets, credential, or token handling.
    - Cross-repository mutation or scanning of external_repos.
    - Replacing or rewriting the shipped Sprint 000-005 kernel.
    - Renaming shipped MP-CAT-000..005 missions or their beads.
    - Treating LLM-generated conclusions as truth without backing evidence.

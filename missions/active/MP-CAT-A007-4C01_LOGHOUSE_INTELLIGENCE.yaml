acceptance_criteria:
  - "completeness: every mission objective maps to one or more BEAD-CAT-A007-4C01 files."
  - "contracts: all seven LOGHOUSE schemas validate sample instances and reject malformed instances."
  - "correlation: at least one finding links evidence from telemetry + deploy/Git + dependency sources."
  - "drift_classification: drift is classified as intentional, accidental, blocked, or unknown and a forbidden edge produces a finding."
  - "control_validation: CI fails the build when a critical (P0/P1) architecture rule is violated."
  - "dispatch: findings are converted into agent-routable dispatch-queue items with owner, evidence, acceptance criteria, and stop condition."
  - "substantive_validation: validation script and pytest suites execute successfully."
  - "presentation_and_disclosure: Mermaid diagrams and runbooks document the pipeline, findings lifecycle, and drift review flow."
success_metrics:
  - python scripts/cat_validate.py --all passes with the new schemas and eight MP-CAT-A007-4C01 BEADs present.
  - python scripts/cat_validate_loghouse.py --root . passes.
  - pytest -q passes including test_loghouse_schemas.py, test_loghouse_engine.py, test_loghouse_rules.py, and test_loghouse_drift.py.
  - LOGHOUSE engine emits a golden finding and dispatch-queue item from fixtures that match the recorded goldens.
  - Confidence score >= 90 for auto-proceed or >= 70 for human-approved proceed.

mission_id: MP-CAT-000
title: Establish Chromatic Atomic Tower Core Foundation
level: M3
status: approved
owner: Human Owner
priority: 1
risk_level: high
reversibility: high
autonomy_level: L4
confidence_minimum: 75
created: "2026-06-17"
last_updated: "2026-06-17"
objective: >-
  Establish a clean CAT repo foundation with mission contracts, BEAD contracts,
  gates, schemas, validation scripts, GO resolver, prompts, and operating docs.
background: >-
  Harness V2 contains useful mission governance concepts. CAT extracts the best
  pieces into a strict and reusable control tower without migrating legacy sprawl.
scope:
  in:
    - create repo skeleton
    - create mission and BEAD templates
    - create registry and active sprint state
    - create validation scripts
    - create GO resolver MVP
    - create agent instructions, gates, prompts, docs, and checklists
  out:
    - production deployment
    - external service integration
    - full GitHub API automation
    - swarm execution
allowed_paths:
  - README.md
  - START_HERE.md
  - PDR_CAT_000_ESTABLISH_CORE_REPO.md
  - CAT_MANIFEST.md
  - CAT_PRINCIPLES.md
  - CAT_ROADMAP.md
  - SPRINT_000_PLAN.md
  - QUICKSTART.md
  - AGENTS.md
  - CHROMATIC_TREES.md
  - GOVERNANCE.md
  - missions/**
  - beads/**
  - agents/**
  - gates/**
  - evidence/**
  - schemas/**
  - scripts/**
  - playbooks/**
  - docs/**
  - state/**
  - learnings/**
  - prompts/**
  - checklists/**
  - reference/**
  - .github/**
  - tests/**
  - requirements.txt
  - pyproject.toml
  - Makefile
forbidden_paths:
  - .env
  - .env.*
  - infra/prod/**
  - secrets/**
  - credentials/**
  - private/**
dependencies:
  - Python 3.11+
  - PyYAML
  - jsonschema
acceptance_criteria:
  - Repo skeleton exists and matches CAT_MANIFEST.md.
  - Mission and BEAD schemas validate.
  - Active mission and active BEAD exist.
  - GO resolver returns BEAD-CAT-000-001.
  - Agent role and gate files exist.
  - Evidence and learning directories exist.
  - V2 donor extraction plan exists.
success_metrics:
  - cat_check_repo passes
  - cat_validate --all passes
  - cat_resolve_go returns dispatch packet
required_validation:
  - type: repo_check
    command: python scripts/cat_check_repo.py
    evidence_path: evidence/reports/repo_check_sprint_000.md
    required: true
  - type: schema_validation
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/schema_validation_sprint_000.md
    required: true
  - type: go_resolution
    command: python scripts/cat_resolve_go.py
    evidence_path: evidence/reports/go_resolution_sprint_000.md
    required: true
rollback:
  required: true
  plan: >-
    Revert baseline commit or remove generated CAT files before adopting the repo.
human_gate:
  required: false
  approver: Human Owner
tool_budget:
  search: 2
  read: 12
  write: 40
  execute: 8
  max_runtime_minutes: 60
beads:
  - bead_id: BEAD-CAT-000-001
    title: Establish repo skeleton and canonical manifest
    status: active
  - bead_id: BEAD-CAT-000-002
    title: Validate mission and BEAD schemas
    status: queued
  - bead_id: BEAD-CAT-000-003
    title: Prove GO resolver returns next action
    status: queued
  - bead_id: BEAD-CAT-000-004
    title: Close sprint with evidence and learning log
    status: queued
evidence_requirements:
  - repo_check_output
  - schema_validation_output
  - go_resolver_output
  - closeout_summary
notes:
  - V2 is donor material only.
  - CAT must remain stricter and smaller than Harness V2.

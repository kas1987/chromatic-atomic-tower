id_convention:
  scheme: MP-<repo>-<tier><NNN>-<cx>C<oo>
  type: MP
  repo: CAT
  priority_tier: A
  global_mission_number: '010'
  complexity: 4
  relative_execution_order: '01'
objective: Connect CAT Mission Packs and BEADs to GitHub branches, pull requests,
  issue templates, commit messages, changed-file scope checks, CI gates, and review
  workflows so every repo mutation traces back to a Mission ID, BEAD ID, evidence
  bundle, and validation path.
background: Donor package adapted from chromatic_atomic_tower_sprint_005.zip after
  MP-CAT-A009-4C01 reconciliation closed. Implements the GitHub Bridge external enforcement
  layer using A-tier mission and BEAD identifiers.
scope:
  in:
  - Branch naming rules tied to missions and BEADs
  - PR title and commit message validation
  - Changed-file scope validation
  - Issue-to-mission intake scaffolding
  - GitHub Bridge CI workflow
  - Evidence report generation
  - Operator guide, playbook, checklist, tests
  out:
  - Repository settings mutation
  - Branch protection mutation
  - Secret scanning configuration mutation
  - Production deployment
  - Automatic merge behavior
allowed_paths:
- .github/**
- docs/operations/**
- docs/github/**
- gates/github/**
- schemas/pr_metadata.schema.json
- schemas/github_bridge.schema.json
- scripts/cat_git_bridge.py
- scripts/cat_branch_name.py
- scripts/cat_issue_intake.py
- scripts/cat_changed_files_guard.py
- tests/**
- playbooks/GITHUB_BRIDGE_PLAYBOOK.md
- checklists/GITHUB_BRIDGE_CHECKLIST.md
- prompts/PRO_GPT_SPRINT_010_PROMPT.md
- evidence/github/**
- missions/active/MP-CAT-A010-4C01_GITHUB_BRIDGE_PR_GOVERNANCE.yaml
- beads/active/BEAD-CAT-A010-4C01-*.yaml
- SPRINT_010_PLAN.md
- PDR_CAT_A010_GITHUB_BRIDGE_PR_GOVERNANCE.md
- CAT_ROADMAP.md
- CHANGELOG.md
- state/**
forbidden_paths:
- .env
- .env.*
- secrets/**
- credentials/**
- infra/prod/**
- .git/**
- evidence/**/*.fabricated
dependencies:
- MP-CAT-A009-4C01
acceptance_criteria:
- PR titles require Mission ID and BEAD ID.
- Branch names require Mission ID and BEAD ID.
- Commit messages require Mission ID and BEAD ID.
- Changed files must match the selected BEAD allowed paths.
- Issue intake can scaffold a draft Mission Pack candidate.
- GitHub Bridge CI can run locally without network credentials.
- Validation reports are emitted under evidence/github/reports/.
- Tests pass for A-tier and grandfathered legacy ID formats.
success_metrics:
- python scripts/cat_git_bridge.py validate-pr passes for A010 happy path
- python scripts/cat_branch_name.py validate passes for A010 branch
- python scripts/cat_changed_files_guard.py passes for allowed fixture
- pytest -q passes for GitHub Bridge test modules
required_validation:
- type: github_bridge
  command: python scripts/cat_git_bridge.py validate-pr --title "[MP-CAT-A010-4C01][BEAD-CAT-A010-4C01-01]
    Define GitHub governance contract" --branch feat/mp-cat-a010-4c01-bead-cat-a010-4c01-01-github-contract
    --commit-message "[MP-CAT-A010-4C01][BEAD-CAT-A010-4C01-01] Define GitHub governance
    contract" --bead beads/active/BEAD-CAT-A010-4C01-01.yaml --changed-files tests/fixtures/github/changed_files_allowed.txt
    --write-report
  evidence_path: evidence/github/reports/github_bridge_report.json
  required: true
- type: branch_name
  command: python scripts/cat_branch_name.py validate feat/mp-cat-a010-4c01-bead-cat-a010-4c01-01-github-contract
  evidence_path: evidence/github/reports/github_bridge_report.json
  required: true
- type: changed_files
  command: python scripts/cat_changed_files_guard.py --bead beads/active/BEAD-CAT-A010-4C01-01.yaml
    --changed-files tests/fixtures/github/changed_files_allowed.txt
  evidence_path: evidence/github/reports/github_bridge_report.json
  required: true
- type: tests
  command: python -m pytest -q tests/test_git_bridge.py tests/test_branch_name.py
    tests/test_changed_files_guard.py tests/test_issue_intake.py
  evidence_path: evidence/test-results/MP-CAT-A010-4C01_tests.txt
  required: true
rollback:
  required: true
  plan: Remove GitHub Bridge scripts, workflow, gates, beads, mission file, and generated
    evidence. Restore registry and tower state via Git.
human_gate:
  required: true
  approver: Human Owner
tool_budget:
  search: 3
  read: 15
  write: 12
  execute: 8
  max_runtime_minutes: 90
beads:
- bead_id: BEAD-CAT-A010-4C01-01
  title: Define GitHub governance contract
- bead_id: BEAD-CAT-A010-4C01-02
  title: Implement PR metadata validator
- bead_id: BEAD-CAT-A010-4C01-03
  title: Implement changed-file scope guard
- bead_id: BEAD-CAT-A010-4C01-04
  title: Implement issue intake scaffold
- bead_id: BEAD-CAT-A010-4C01-05
  title: Wire GitHub Bridge CI and operator docs
evidence_requirements:
- github_bridge_report
- github_bridge_tests
- operator_guide

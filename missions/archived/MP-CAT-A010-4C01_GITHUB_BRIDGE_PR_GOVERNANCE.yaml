mission_id: MP-CAT-A010-4C01
title: GitHub Bridge + PR Governance Engine
level: M3
status: closed
owner: Human Owner
priority: 1
risk_level: medium
reversibility: high
autonomy_level: L3
confidence_minimum: 80
created: '2026-06-18'

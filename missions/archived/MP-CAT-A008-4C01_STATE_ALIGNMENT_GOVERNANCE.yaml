objective: >-
  Make mission and BEAD status a single auditable truth enforced at creation,
  transition, GO dispatch, and CI — with blocking failure on misalignment.
background: >-
  Documented drift between TOWER_STATE, MISSION_REGISTRY, and contract files caused
  GO dispatch failures, mission ID collisions (MP-CAT-002 vs MP-CAT-005), and stale
  sprint markdown. Sprint 004 guards were report-only and not wired into CI.
scope:
  in:
    - Alignment invariants doc and extended freshness checks
    - cat_align_check.py CI/GO entry point
    - Mission ID collision prevention at creation and validation
    - GO dispatch gate and sprint closeout operator script
    - Blocking CI integration
    - Auto-generated SPRINT_STATE.md and AGENT_HANDOFF_QUEUE.md
    - Operator playbooks and live-repo remediation
  out:
    - Automatic repair of drift (report-only guards remain for tower guard)
    - Renaming shipped MP-CAT-000..005 missions
    - Production deployment changes

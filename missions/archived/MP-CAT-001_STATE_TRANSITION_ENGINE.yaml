mission_id: MP-CAT-001
title: Implement CAT State Transition Engine
level: M3
status: closed
owner: Human Owner
priority: 1
risk_level: medium
reversibility: high
autonomy_level: L3
confidence_minimum: 75
created: '2026-06-17'
last_updated: '2026-06-18T01:10:18+00:00'
objective: Implement deterministic state transition tooling for mission and BEAD lifecycle
  changes so CAT can move work through approved states with evidence and audit logs.
background: Sprint 000 established the repo kernel, mission registry, BEAD contracts,
  validation scripts, confidence gates, and GO-mode resolver. Sprint 001 turns the
  static lifecycle model into an executable state transition engine.
scope:
  in:
  - mission lifecycle transition rules
  - BEAD lifecycle transition rules
  - transition CLI
  - registry mutation
  - tower state mutation
  - transition audit logging
  - unit tests
  - operator documentation
  - GO-mode continuity instructions
  out:
  - GitHub API mutation
  - remote branch automation
  - production deployment
  - secret handling
  - multi-repo orchestration
allowed_paths:
- gates/state/**
- schemas/transition_event.schema.json
- scripts/cat_transition.py
- scripts/cat_status.py
- tests/**
- docs/architecture/STATE_MACHINE.md
- docs/operations/STATE_TRANSITIONS.md
- docs/operations/SPRINT_001_OPERATOR_GUIDE.md
- playbooks/STATE_TRANSITION_PLAYBOOK.md
- missions/active/MP-CAT-001_STATE_TRANSITION_ENGINE.yaml
- beads/active/BEAD-CAT-001-*.yaml
- state/**
- evidence/**
- learnings/**
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies:
- MP-CAT-000
acceptance_criteria:
- Transition rules are explicit and machine-readable.
- Valid mission and BEAD transitions pass.
- Invalid transitions fail with a clear reason.
- Transition CLI can run in dry-run mode.
- Transition CLI writes JSONL audit events when applied.
- Mission registry and tower state update deterministically.
- Unit tests cover allowed, denied, and terminal transitions.
- Operator guide explains how to move missions and BEADs safely.
success_metrics:
- 100% of defined valid mission/BEAD transitions pass automated tests.
- 100% of defined invalid transitions are rejected with explicit error codes.
- 100% of YAML contracts validate.
- All transitions capture evidence artifacts in evidence/logs/transitions.jsonl.
- GO resolver continues selecting the active Sprint 001 BEAD.
required_validation:
- type: schema
  command: python scripts/cat_validate.py --all
  evidence_path: evidence/reports/schema_validation_sprint_001.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/sprint_001_transition_tests.txt
  required: true
- type: go_resolution
  command: python scripts/cat_resolve_go.py
  evidence_path: evidence/reports/go_resolution_sprint_001.md
  required: true
- type: transition_dry_run
  command: python scripts/cat_transition.py --type bead --id BEAD-CAT-001-001 --to
    in_progress --reason "dry-run validation" --evidence evidence/reports/sprint_001_transition_dry_run.md
    --dry-run
  evidence_path: evidence/reports/sprint_001_transition_dry_run.md
  required: true
rollback:
  required: true
  plan: Revert scripts/cat_transition.py, scripts/cat_status.py, transition schema,
    state gate rules, and Sprint 001 BEAD/mission updates. Preserve evidence logs
    for incident review.
human_gate:
  required: false
  approver: Human Owner
tool_budget:
  search: 2
  read: 10
  write: 12
  execute: 6
  max_runtime_minutes: 60
beads:
- bead_id: BEAD-CAT-001-001
  title: Define lifecycle transition matrix
- bead_id: BEAD-CAT-001-002
  title: Implement transition CLI
- bead_id: BEAD-CAT-001-003
  title: Add transition tests and schema checks
- bead_id: BEAD-CAT-001-004
  title: Document operator workflow and closeout evidence
evidence_requirements:
- evidence/logs/transitions.jsonl
- evidence/test-results/sprint_001_transition_tests.txt
- evidence/reports/sprint_001_schema_validation.md
- evidence/rollbacks/rollback_records.jsonl
notes:
- Sprint 001 makes CAT lifecycle movement executable instead of purely documented.
- This mission is intentionally M3 because it mutates state files and controls future
  automation behavior.

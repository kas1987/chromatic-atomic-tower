objective: 'Automate agent scorecard maintenance: define a validated schema, implement
  a CLI scoring engine (promotion, demotion, incident penalties), add tool-budget
  usage tracking per BEAD, and wire scorecard updates into the bead closeout flow
  so every BEAD completion drives a measurable trust signal.'
background: "The AGENT_SCORECARD.yaml exists as a v0.0.0 placeholder with zeroed counters.\
  \ No automation updates it. A011 builds the full data \u2192 rule \u2192 script\
  \ \u2192 evidence pipeline so agent trust scores reflect actual delivery history.\
  \ Dependencies MP-CAT-A009-4C01 and MP-CAT-A010-4C01 are both closed."

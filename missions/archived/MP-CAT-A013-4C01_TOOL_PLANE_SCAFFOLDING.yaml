objective: "Close conformance gap G-7 by scaffolding the diagram's remaining tool\
  \ planes (Database and Calendar/Email) as validated schemas plus read-only adapter\
  \ interfaces, and enumerate every tool plane in a governed tool registry \u2014\
  \ with no live external credentials or outbound calls."
background: The Chromatic Atomic Harness diagram shows a Tool + Context Layer spanning
  Git, Filesystem, Database, Web, Terminal, Calendar/Email, LLM, Custom Tools and
  3rd-party APIs. Most are implemented; the Database plane is only implicit (SQLite
  via loghouse/codegraph) and Calendar/Email is absent. This mission adds the governance
  scaffolding (schema + adapter interface + registry) so the planes are first-class
  and auditable, deferring any live integration (which needs credentials and a security
  gate) to a future mission.
scope:
  in:
  - Database tool-plane schema + read-only adapter interface stub
  - Calendar/Email (comms) tool-plane schema + read-only adapter interface stub
  - Governed tool registry (agents/registry/TOOL_REGISTRY.yaml) + schema
  - Tests, validation wiring, and conformance/doc updates
  out:
  - Live external credentials, secrets, or outbound network calls
  - Real database migrations or email/calendar sends
  - Changes to existing tool planes (Git, FS, Web, Terminal, LLM)

    status: queued
required_validation:
  - type: tests
    command: python -m pytest -q tests/test_cat_transition.py tests/test_cat_closeout.py tests/test_cat_evidence_index.py tests/test_cat_cost_guard.py tests/test_cat_pr_guard.py tests/test_cat_score_agent.py tests/test_cat_resolve_go.py
    evidence_path: evidence/reports/MP-CAT-A014-4C01_test_report.txt
    required: true
  - type: schema
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/MP-CAT-A014-4C01_validation.txt
    required: true
  - type: cost_guard
    command: python scripts/cat_cost_guard.py --check
    evidence_path: evidence/reports/MP-CAT-A014-4C01_cost_guard.txt
    required: true
rollback:
  required: true
  plan: >-
    Remove scripts/cat_cost_guard.py, scripts/cat_pr_guard.py, scripts/cat_score_agent.py,
    scripts/cat_evidence_index.py; revert cat_transition.py, cat_closeout.py, cat_resolve_go.py
    to prior state; remove new test files and docs; revert evidence/manifest.yaml.
human_gate:
  required: true
  approver: Auditor
tool_budget:
  search: 4
  read: 30
  write: 25
  execute: 20
  max_runtime_minutes: 180
evidence_requirements:
  - schema_validation
  - test_suite_pass
  - cost_guard_pass
  - pr_guard_pass
  - go_dispatch_schema_pass
notes:
  - Sequential BEAD execution; each depends on the prior.
  - No AI API calls in GitHub Actions — cost guard enforces this.
  - Human approval required before merging to master.

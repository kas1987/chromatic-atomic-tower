name: Validate CAT

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: validate-cat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CAT_ROOT_HYGIENE_MODE: warn
      CAT_HYGIENE_KILL_SWITCH: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/cat_check_repo.py
      - run: python scripts/cat_root_hygiene_strict.py
      - run: python scripts/cat_resolve_go.py
      - run: pytest -q

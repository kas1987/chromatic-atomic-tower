objective: 'Extend Chromatic Atomic Tower from a control tower into an audit-grade
  Harness Engineering operating system where every mission is scoped, decomposed,
  dispatched, evidenced, validated, governed, scored, closed, and learned from. MP-CAT-A006-4C01
  adds the explicit audit methodology layer on top of the existing kernel: assertions,
  completeness, substantive validation, tests of controls, evidence hierarchy, complexity-aware
  model routing, CI/CD gates, and promotion controls.'
background: 'Sourced from the external harness_engineering_pack (originally authored
  as MP-CAT-001 against a Sprint 000 snapshot). The repo has since shipped Sprints
  000-005, so the pack was renumbered and its artifacts rewritten to the live CAT
  mission and BEAD schemas. It is also the first mission to adopt the Type-Repo-Priority-Complexity
  ID convention (MP-CAT-A006-4C01); shipped missions MP-CAT-000..005 keep their legacy
  IDs. Overlapping concerns (model routing, agent roles, gates) EXTEND the existing
  kernel rather than duplicate it: complexity routing folds into agents/model_routes.yaml;
  role audit content folds into agents/roles/*.md; assertion gate contracts live as
  flat YAML alongside the existing per-stage gate directories.'
scope:
  in:
  - Audit-grade Harness Engineering methodology documentation.
  - Harness assertion library and assertion-to-evidence mapping.
  - Completeness, substantive validation, control validation, promotion, and release
    gate contracts.
  - Skill registry and complexity-aware (M1-M4 / C1-C4) model routing folded into
    existing routing.
  - Agent role audit responsibilities folded into existing agents/roles/*.md.
  - CI governance workflow and CI/CD promotion workflow tied to evidence + confidence.
  - Validation scripts and pytest coverage for the new contracts.
  - Mermaid charts for mission pipeline, gates, agents, routing, and CI/CD ladder.
  - Type-Repo-Priority-Complexity ID naming convention documentation.
  out:
  - Production deployment.
  - Secrets or credential handling.
  - Cross-repository mutation.
  - Replacing or rewriting the existing Sprint 000-005 kernel.
  - Renaming shipped MP-CAT-000..005 missions or their beads.
  - Auto-merge of governance changes without human M4 approval.

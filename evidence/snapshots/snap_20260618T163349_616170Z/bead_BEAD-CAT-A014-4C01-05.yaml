bead_id: BEAD-CAT-A014-4C01-05
mission_id: MP-CAT-A014-4C01
title: GitHub PR and Issue Bridge — Templates and Guard
status: queued
agent_role: Builder
autonomy_level: L3
objective: >-
  Add or upgrade GitHub PR template and issue templates to enforce Mission ID and
  BEAD ID; implement cat_pr_guard.py to validate PR body patterns locally.
allowed_paths:
  - .github/ISSUE_TEMPLATE/**
  - .github/PULL_REQUEST_TEMPLATE.md
  - scripts/cat_pr_guard.py
  - tests/test_cat_pr_guard.py
  - docs/github_bridge.md
forbidden_paths:
  - .env
  - secrets/**
dependencies:
  - BEAD-CAT-A014-4C01-04
tool_budget:
  search: 2
  read: 6
  write: 6
  execute: 4
  max_runtime_minutes: 25
confidence:
  minimum: 76
  current: 80
  objective_clarity: 85
  scope_clarity: 85
  evidence_quality: 78
  reversibility: 88
  tool_fit: 82
  risk_awareness: 80
  testability: 84
risk_level: medium
reversibility: high
stop_conditions:
  - PR guard changes conflict with existing cat-github-bridge.yml.
  - Confidence drops below minimum.
stop_on_forbidden_path: true
definition_of_done:
  - PULL_REQUEST_TEMPLATE.md includes Mission ID, BEAD ID, evidence links, validation output.
  - ISSUE_TEMPLATE includes mission_request and bead_task templates.
  - cat_pr_guard.py --check-samples passes.
  - tests/test_cat_pr_guard.py passes.
  - docs/github_bridge.md documents the bridge.
  - evidence/reports/github-bridge-test-output.txt written.
validation:
  - type: script_check
    command: python scripts/cat_pr_guard.py --check-samples
    evidence_path: evidence/reports/github-bridge-test-output.txt
    required: true
  - type: unit_tests
    command: python -m pytest -q tests/test_cat_pr_guard.py
    evidence_path: evidence/reports/pr-guard-pytest-output.txt
    required: true
required_output:
  - summary
  - files_changed
  - validation_result
  - evidence_path
handoff:
  next_bead_id: BEAD-CAT-A014-4C01-06
  notes:
    - Check existing .github/PULL_REQUEST_TEMPLATE.md before creating new one.

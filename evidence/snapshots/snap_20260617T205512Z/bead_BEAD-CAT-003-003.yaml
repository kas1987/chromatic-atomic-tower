- updated_files
- validation_output
- next_recommended_bead
handoff:
  from: Orchestrator
  to: Builder
  reviewer: Auditor
  notes: Keep changes bounded to the assigned BEAD.
bead_id: BEAD-CAT-003-003
title: Implement bounded self-healing validator
objective: Implement self-healing validation that can dry-run and apply only safe
  structural repairs while refusing truth-bearing or high-risk repair classes.
allowed_paths:
- scripts/cat_self_heal.py
- docs/operations/SELF_HEALING_VALIDATION.md
- tests/test_self_heal.py
- evidence/ci/self-heal/**
stop_conditions:
- CI behavior would mutate truth-bearing evidence.
- Self-heal attempts to touch forbidden paths.
- PR scope behavior conflicts with BEAD allowed paths.
- Tests fail for reasons inside Sprint 003 scope.
definition_of_done:
- Self-heal dry-run lists proposed safe repairs.
- Apply mode creates only approved structural placeholders.
- Forbidden repair classes are documented and blocked.
- Tests cover dry-run and blocked classes.
validation:
- type: ci_local
  command: python scripts/cat_ci.py --mode local --write-report
  evidence_path: evidence/ci/reports/cat_ci_report.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/sprint_003_ci_tests.txt
  required: true

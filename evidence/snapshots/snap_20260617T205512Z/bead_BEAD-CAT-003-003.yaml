mission_id: MP-CAT-003
status: queued
agent_role: Builder
autonomy_level: L3
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies: []
tool_budget:
  search: 1
  read: 6
  write: 6
  execute: 4
  max_runtime_minutes: 35
confidence:
  minimum: 80
  current: 88
  objective_clarity: 92
  scope_clarity: 88
  evidence_quality: 86
  reversibility: 90
  tool_fit: 88
  risk_awareness: 88
  testability: 90
risk_level: medium
reversibility: high

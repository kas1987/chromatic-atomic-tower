bead_id: BEAD-CAT-A006-4C01-01
mission_id: MP-CAT-A006-4C01
title: Define Harness assertions and gate contracts
status: reviewed
agent_role: Auditor
autonomy_level: L2
objective: Create the assertion library and machine-readable gate set that maps audit
  concepts (completeness, control validation, substantive validation, evidence sufficiency)
  into CAT, expressed as flat gate contracts alongside the existing per-stage gate
  directories.
allowed_paths:
- docs/architecture/HARNESS_ENGINEERING_AUDIT_ALIGNMENT.md
- gates/assertion_gates.yaml
- gates/completeness_gate.yaml
- gates/substantive_validation_gate.yaml
- gates/control_validation_gate.yaml
- gates/promotion_gate.yaml
- gates/release_gate.yaml
- schemas/gate_result.schema.json
forbidden_paths:
- .env
- .env.*
- .venv/**
- secrets/**
- credentials/**
- infra/prod/**
- external_repos/**
dependencies: []
assertions:
- completeness
- control_validation
- substantive_validation
- evidence_sufficiency
tool_budget:
  search: 2
  read: 8
  write: 8
  execute: 3
  max_runtime_minutes: 40
confidence:
  minimum: 70
  current: 80
  objective_clarity: 88
  scope_clarity: 85
  evidence_quality: 75
  reversibility: 95
  tool_fit: 85
  risk_awareness: 82
  testability: 80
risk_level: medium
reversibility: high
stop_conditions:
- Required input mission pack missing.
- Requested path outside allowed_paths.
- Validation failure that cannot be fixed within this BEAD scope.
- Need for secret, credential, destructive action, or production access.
definition_of_done:
- Assertion gate contracts exist and are machine-readable YAML.
- gate_result.schema.json exists and validates gate output structure.
- cat_validate_harness_alignment.py recognizes the required gate ids.
- Evidence output location is identified.
validation:
- type: harness_alignment
  command: python scripts/cat_validate_harness_alignment.py --root .
  evidence_path: evidence/reports/BEAD-CAT-A006-4C01-01_assertion_gates.md
  required: true
required_output:
- updated_files
- validation_output
- next_recommended_bead

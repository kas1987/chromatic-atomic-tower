bead_id: BEAD-CAT-A014-4C01-02
mission_id: MP-CAT-A014-4C01
title: BEAD Closeout Enforcement — Evidence Manifest Schema and Tests
status: queued
agent_role: Builder
autonomy_level: L3
objective: >-
  Validate and harden cat_closeout.py, publish evidence_manifest.schema.json,
  seed evidence/manifest.yaml, and add test_cat_closeout.py.
allowed_paths:
  - scripts/cat_closeout.py
  - schemas/evidence_manifest.schema.json
  - evidence/manifest.yaml
  - docs/bead_closeout_engine.md
  - tests/test_cat_closeout.py
forbidden_paths:
  - .env
  - secrets/**
dependencies:
  - BEAD-CAT-A014-4C01-01
tool_budget:
  search: 2
  read: 8
  write: 6
  execute: 4
  max_runtime_minutes: 30
confidence:
  minimum: 82
  current: 84
  objective_clarity: 88
  scope_clarity: 85
  evidence_quality: 82
  reversibility: 90
  tool_fit: 85
  risk_awareness: 84
  testability: 86
risk_level: medium
reversibility: high
stop_conditions:
  - cat_closeout.py changes break existing callers.
  - Confidence drops below minimum.
  - Missing evidence gate files cannot be created within allowed_paths.
stop_on_forbidden_path: true
definition_of_done:
  - Closeout requires Mission ID, BEAD ID, evidence, and validation output.
  - Missing evidence blocks closeout with nonzero exit.
  - evidence_manifest.schema.json exists and is valid JSON Schema.
  - evidence/manifest.yaml exists (may be empty seed).
  - tests/test_cat_closeout.py passes.
  - docs/bead_closeout_engine.md documents the closeout flow.
  - evidence/reports/closeout-test-output.txt written.
validation:
  - type: unit_tests
    command: python -m pytest -q tests/test_cat_closeout.py
    evidence_path: evidence/reports/closeout-test-output.txt
    required: true
  - type: validate_all
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/validate_go002.txt
    required: true
required_output:
  - summary
  - files_changed
  - validation_result
  - evidence_path
handoff:
  next_bead_id: BEAD-CAT-A014-4C01-03
  notes:
    - Closeout mutation must be script-controlled, not manual edits.

bead_id: BEAD-CAT-001-004
mission_id: MP-CAT-001
title: Document operator workflow and closeout evidence
status: queued
agent_role: Scribe
autonomy_level: L3
objective: Document the state transition operating model, operator commands, review
  expectations, evidence requirements, and closeout path for Sprint 001.
allowed_paths:
- docs/operations/STATE_TRANSITIONS.md
- docs/operations/SPRINT_001_OPERATOR_GUIDE.md
- playbooks/STATE_TRANSITION_PLAYBOOK.md
- checklists/STATE_TRANSITION_CHECKLIST.md
- evidence/reports/**
- learnings/**
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies:
- BEAD-CAT-001-003
tool_budget:
  search: 1
  read: 6
  write: 5
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 75
  current: 86
  objective_clarity: 90
  scope_clarity: 88
  evidence_quality: 82
  reversibility: 90
  tool_fit: 86
  risk_awareness: 84
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- Required evidence path is missing for a review/completion transition.
- Requested transition is not listed in gates/state/STATE_TRANSITION_RULES.yaml.
- Transition attempts to touch a forbidden path.
- Registry and target contract disagree on mission or BEAD identity.
- Tests fail for reasons inside Sprint 001 scope.
definition_of_done:
- Operator guide is complete.
- Playbook explains lifecycle movement.
- Checklist is available.
- Evidence report exists.
- Learning log is updated.
validation:
- type: docs_review
  command: manual review docs/operations/STATE_TRANSITIONS.md
  evidence_path: evidence/reports/sprint_001_docs_review.md
  required: true
required_output:
- updated_files
- evidence_note
- next_recommended_transition
handoff:
  from: Orchestrator
  to: Scribe
  reviewer: Auditor
  notes: Keep scope atomic. Use transition rules as source of truth.

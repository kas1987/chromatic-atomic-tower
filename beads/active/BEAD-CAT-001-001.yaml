bead_id: BEAD-CAT-001-001
mission_id: MP-CAT-001
title: Define lifecycle transition matrix
status: active
agent_role: Builder
autonomy_level: L3
objective: Create the authoritative state transition rules for missions and BEADs,
  including allowed paths, terminal states, evidence requirements, and confidence
  gate behavior.
allowed_paths:
- gates/state/**
- docs/architecture/STATE_MACHINE.md
- tests/test_transition_engine.py
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies: []
tool_budget:
  search: 1
  read: 6
  write: 5
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 75
  current: 86
  objective_clarity: 90
  scope_clarity: 88
  evidence_quality: 82
  reversibility: 90
  tool_fit: 86
  risk_awareness: 84
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- Required evidence path is missing for a review/completion transition.
- Requested transition is not listed in gates/state/STATE_TRANSITION_RULES.yaml.
- Transition attempts to touch a forbidden path.
- Registry and target contract disagree on mission or BEAD identity.
- Tests fail for reasons inside Sprint 001 scope.
definition_of_done:
- Mission transitions are explicitly listed.
- BEAD transitions are explicitly listed.
- Terminal states are protected.
- Evidence-required target states are identified.
validation:
- type: tests
  command: pytest -q tests/test_transition_engine.py
  evidence_path: evidence/test-results/sprint_001_transition_tests.txt
  required: true
required_output:
- updated_files
- evidence_note
- next_recommended_transition
handoff:
  from: Orchestrator
  to: Builder
  reviewer: Auditor
  notes: Keep scope atomic. Use transition rules as source of truth.

bead_id: BEAD-CAT-A011-4C01-02
mission_id: MP-CAT-A011-4C01
title: Implement trust scoring engine CLI
status: queued
agent_role: Builder
autonomy_level: L2
objective: >-
  Implement scripts/cat_agent_scorecard.py with subcommands: score-bead
  (record a completed/failed BEAD), penalize (apply incident penalty), promote
  (raise trust level), demote (lower trust level), report (print per-agent
  summary). Scoring formula: +5 completed, -10 failed, -15 incident (floor 40,
  promote ≥ 85, demote ≤ 55). All mutations require --dry-run by default;
  --execute required to write.
allowed_paths:
  - scripts/cat_agent_scorecard.py
  - agents/registry/AGENT_SCORECARD.yaml
  - agents/scorecards/**
  - tests/test_agent_scorecard.py
  - tests/fixtures/scorecards/**
  - evidence/scorecard/BEAD-CAT-A011-4C01-02_tests.json
forbidden_paths:
  - .env
  - .env.*
  - secrets/**
  - credentials/**
  - infra/prod/**
  - .git/**
  - agents/registry/AGENT_REGISTRY.yaml
dependencies:
  - BEAD-CAT-A011-4C01-01
tool_budget:
  search: 2
  read: 8
  write: 6
  execute: 4
  max_runtime_minutes: 45
confidence:
  minimum: 80
  current: 85
  objective_clarity: 88
  scope_clarity: 87
  evidence_quality: 82
  reversibility: 85
  tool_fit: 90
  risk_awareness: 82
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
  - Script mutates AGENT_SCORECARD.yaml without --execute flag.
  - Trust level changes without human review logged.
  - Tests fail after implementation.
definition_of_done:
  - scripts/cat_agent_scorecard.py implemented with all 5 subcommands.
  - Dry-run mode is the default; --execute required for writes.
  - tests/test_agent_scorecard.py covers score-bead, penalize, promote, demote, report.
  - All new tests pass.
  - Evidence JSON produced.
validation:
  - type: tests
    command: python -m pytest -q tests/test_agent_scorecard.py
    evidence_path: evidence/scorecard/BEAD-CAT-A011-4C01-02_tests.json
    required: true
required_output:
  - scoring_engine_script
  - test_suite
handoff:
  from: Builder
  to: Reviewer
  reviewer: Human Owner
  next_bead_id: BEAD-CAT-A011-4C01-03
last_updated: '2026-06-18T06:00:00+00:00'

bead_id: BEAD-CAT-001-003
mission_id: MP-CAT-001
title: Add transition tests and schema checks
status: queued
agent_role: Reviewer
autonomy_level: L3
objective: Add test coverage and schema validation for transition events, denied transitions,
  terminal protections, and GO-mode continuity.
allowed_paths:
- tests/**
- schemas/transition_event.schema.json
- scripts/cat_validate.py
- evidence/test-results/**
- evidence/reports/**
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies:
- BEAD-CAT-001-002
tool_budget:
  search: 1
  read: 6
  write: 5
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 75
  current: 86
  objective_clarity: 90
  scope_clarity: 88
  evidence_quality: 82
  reversibility: 90
  tool_fit: 86
  risk_awareness: 84
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- Required evidence path is missing for a review/completion transition.
- Requested transition is not listed in gates/state/STATE_TRANSITION_RULES.yaml.
- Transition attempts to touch a forbidden path.
- Registry and target contract disagree on mission or BEAD identity.
- Tests fail for reasons inside Sprint 001 scope.
definition_of_done:
- Allowed transition test passes.
- Denied transition test passes.
- Terminal transition test passes.
- Transition event schema validates.
- Full CAT validation passes.
validation:
- type: schema
  command: python scripts/cat_validate.py --all
  evidence_path: evidence/reports/schema_validation_sprint_001.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/sprint_001_transition_tests.txt
  required: true
required_output:
- updated_files
- evidence_note
- next_recommended_transition
handoff:
  from: Orchestrator
  to: Reviewer
  reviewer: Auditor
  notes: Keep scope atomic. Use transition rules as source of truth.

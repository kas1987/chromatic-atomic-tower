bead_id: BEAD-CAT-002-001
mission_id: MP-CAT-002
title: Define evidence gate rules and bundle schema
status: active
agent_role: Builder
autonomy_level: L3
objective: Create the authoritative evidence gate rules and evidence bundle schema that define what proof is required before BEAD or mission closeout.
allowed_paths:
  - gates/evidence/**
  - schemas/evidence_bundle.schema.json
  - docs/operations/EVIDENCE_GATE.md
  - tests/test_evidence_gate.py
forbidden_paths:
  - .env
  - infra/prod/**
  - secrets/**
  - production/**
  - deploy/**
dependencies: []
tool_budget:
  search: 1
  read: 5
  write: 5
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 78
  current: 88
  objective_clarity: 92
  scope_clarity: 90
  evidence_quality: 84
  reversibility: 90
  tool_fit: 86
  risk_awareness: 86
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
  - Evidence requirements conflict with existing mission or BEAD schemas.
  - Evidence bundle cannot reference mission and BEAD IDs clearly.
  - Required artifact path behavior is ambiguous.
  - Tests fail for reasons inside Sprint 002 scope.
definition_of_done:
  - Evidence gate rules exist.
  - Evidence bundle schema exists.
  - Passing and failing evidence examples are defined.
  - Evidence rules explain required validation behavior.
validation:
  - type: schema
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/schema_validation_sprint_002.md
    required: true
required_output:
  - updated_files
  - evidence_schema_note
  - next_recommended_bead
handoff:
  from: Orchestrator
  to: Builder
  reviewer: Auditor
  notes: Keep evidence rules explicit and machine-readable.

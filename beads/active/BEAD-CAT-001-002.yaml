bead_id: BEAD-CAT-001-002
mission_id: MP-CAT-001
title: Implement transition CLI
status: queued
agent_role: Builder
autonomy_level: L3
objective: Implement `scripts/cat_transition.py` to apply or dry-run mission and BEAD
  lifecycle transitions with audit logging and deterministic state updates.
allowed_paths:
- scripts/cat_transition.py
- scripts/cat_status.py
- scripts/common.py
- evidence/logs/**
- tests/test_transition_engine.py
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies:
- BEAD-CAT-001-001
tool_budget:
  search: 1
  read: 6
  write: 5
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 75
  current: 86
  objective_clarity: 90
  scope_clarity: 88
  evidence_quality: 82
  reversibility: 90
  tool_fit: 86
  risk_awareness: 84
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- Required evidence path is missing for a review/completion transition.
- Requested transition is not listed in gates/state/STATE_TRANSITION_RULES.yaml.
- Transition attempts to touch a forbidden path.
- Registry and target contract disagree on mission or BEAD identity.
- Tests fail for reasons inside Sprint 001 scope.
definition_of_done:
- CLI supports mission and BEAD targets.
- CLI supports dry-run and apply modes.
- Transition events are written as JSONL.
- Registry and tower state update when appropriate.
validation:
- type: transition_dry_run
  command: python scripts/cat_transition.py --type bead --id BEAD-CAT-001-001 --to
    in_progress --reason "dry-run validation" --evidence evidence/reports/sprint_001_transition_dry_run.md
    --dry-run
  evidence_path: evidence/reports/sprint_001_transition_dry_run.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/sprint_001_transition_tests.txt
  required: true
required_output:
- updated_files
- evidence_note
- next_recommended_transition
handoff:
  from: Orchestrator
  to: Builder
  reviewer: Auditor
  notes: Keep scope atomic. Use transition rules as source of truth.

bead_id: BEAD-CAT-000-003
mission_id: MP-CAT-000
title: Prove GO resolver returns next action
status: queued
agent_role: Orchestrator
autonomy_level: L4
objective: >-
  Run the GO resolver and confirm it selects the highest-priority approved unblocked BEAD.
allowed_paths:
  - scripts/cat_resolve_go.py
  - state/**
  - missions/registry/MISSION_REGISTRY.yaml
  - beads/active/**
  - evidence/reports/**
forbidden_paths:
  - .env
  - infra/prod/**
  - secrets/**
dependencies:
  - BEAD-CAT-000-002
tool_budget:
  search: 0
  read: 8
  write: 3
  execute: 3
  max_runtime_minutes: 20
confidence:
  minimum: 75
  current: 82
  objective_clarity: 85
  scope_clarity: 85
  evidence_quality: 75
  reversibility: 95
  tool_fit: 80
  risk_awareness: 80
  testability: 80
risk_level: low
reversibility: high
stop_conditions:
  - Resolver selects a blocked or draft mission.
  - Resolver selects a BEAD without active mission parent.
  - Resolver cannot explain selection.
definition_of_done:
  - cat_resolve_go.py outputs dispatch packet.
  - Selected BEAD is traceable to registry.
  - GO evidence captured.
validation:
  - type: go_resolution
    command: python scripts/cat_resolve_go.py
    evidence_path: evidence/reports/go_resolution_sprint_000.md
    required: true
required_output:
  - selected_mission
  - selected_bead
  - dispatch_packet
  - evidence_path
handoff:
  next_bead_id: BEAD-CAT-000-004
  notes:
    - After GO resolver proof, close sprint with evidence.

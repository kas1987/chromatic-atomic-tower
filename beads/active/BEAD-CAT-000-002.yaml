bead_id: BEAD-CAT-000-002
mission_id: MP-CAT-000
title: Validate mission and BEAD schemas
status: completed
agent_role: Builder
autonomy_level: L3
objective: >-
  Run and confirm schema validation for mission registry, active mission, active BEADs, examples, and templates.
allowed_paths:
  - schemas/**
  - scripts/cat_validate.py
  - tests/**
  - evidence/reports/**
  - evidence/test-results/**
forbidden_paths:
  - .env
  - infra/prod/**
  - secrets/**
dependencies:
  - BEAD-CAT-000-001
tool_budget:
  search: 0
  read: 8
  write: 5
  execute: 4
  max_runtime_minutes: 30
confidence:
  minimum: 75
  current: 84
  objective_clarity: 85
  scope_clarity: 85
  evidence_quality: 80
  reversibility: 95
  tool_fit: 85
  risk_awareness: 80
  testability: 85
risk_level: medium
reversibility: high
stop_conditions:
  - Schema failure requires field design not covered by PDR.
  - Need to change mission complexity model.
  - Validation dependency unavailable.
definition_of_done:
  - cat_validate.py --all passes.
  - Example files validate.
  - Validation evidence captured.
validation:
  - type: schema_validation
    command: python scripts/cat_validate.py --all
    evidence_path: evidence/reports/schema_validation_sprint_000.md
    required: true
required_output:
  - validation_result
  - failures_if_any
  - evidence_path
handoff:
  next_bead_id: BEAD-CAT-000-003
  notes:
    - After schema validation, prove GO resolver behavior.

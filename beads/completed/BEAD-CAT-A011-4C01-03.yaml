bead_id: BEAD-CAT-A011-4C01-03
mission_id: MP-CAT-A011-4C01
title: Implement tool-budget tracker
status: completed
agent_role: Builder
autonomy_level: L2
objective: 'Implement scripts/cat_tool_budget_tracker.py that reads a BEAD contract''s
  tool_budget field, compares it against actual tool calls recorded in evidence logs,
  and emits a per-BEAD usage report (JSON). Subcommands: summarize --bead BEAD_ID
  (parse evidence, emit usage %), check --bead BEAD_ID (exit 1 if any budget category
  exceeded).'
allowed_paths:
- scripts/cat_tool_budget_tracker.py
- tests/test_tool_budget_tracker.py
- tests/fixtures/scorecards/**
- evidence/scorecard/BEAD-CAT-A011-4C01-03_tests.json
forbidden_paths:
- .env
- .env.*
- secrets/**
- credentials/**
- infra/prod/**
- .git/**
dependencies:
- BEAD-CAT-A011-4C01-01
tool_budget:
  search: 2
  read: 6
  write: 4
  execute: 3
  max_runtime_minutes: 30
confidence:
  minimum: 80
  current: 84
  objective_clarity: 86
  scope_clarity: 85
  evidence_quality: 82
  reversibility: 90
  tool_fit: 88
  risk_awareness: 82
  testability: 86
risk_level: low
reversibility: high
stop_conditions:
- Script cannot parse BEAD contract YAML.
- Evidence log format changed and parser errors.
- Tests fail.
definition_of_done:
- scripts/cat_tool_budget_tracker.py implemented with summarize and check subcommands.
- tests/test_tool_budget_tracker.py covers happy path and over-budget case.
- All new tests pass.
- Evidence JSON produced.
validation:
- type: tests
  command: python -m pytest -q tests/test_tool_budget_tracker.py
  evidence_path: evidence/scorecard/BEAD-CAT-A011-4C01-03_tests.json
  required: true
required_output:
- budget_tracker_script
- test_suite

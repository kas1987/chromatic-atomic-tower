bead_id: BEAD-CAT-A007-4C01-08
mission_id: MP-CAT-A007-4C01
title: Add agent observability, Mermaid docs, runbooks, and learning closeout
status: completed
agent_role: Scribe
autonomy_level: L2
objective: Close out LOGHOUSE. Add an agent/LLM observability hook that ingests local
  agent run traces as telemetry and enables an agent-drift finding category. Author
  the Mermaid diagrams (architecture flow, findings lifecycle, drift detection), the
  incident-to-finding and drift-review runbooks, the dispatch board, and the mission
  learning record.
allowed_paths:
- scripts/loghouse/agent_obs.py
- scripts/loghouse/__init__.py
- docs/architecture/loghouse/architecture-flow.mmd
- docs/architecture/loghouse/findings-lifecycle.mmd
- docs/architecture/loghouse/drift-detection-flow.mmd
- docs/runbooks/loghouse-incident-to-finding.md
- docs/runbooks/loghouse-drift-review.md
- docs/operations/LOGHOUSE_DISPATCH_BOARD.md
- learnings/MP-CAT-A007-4C01_LOGHOUSE.md
- tests/fixtures/loghouse/**
forbidden_paths:
- .env
- .env.*
- .venv/**
- secrets/**
- credentials/**
- infra/prod/**
- external_repos/**
dependencies:
- BEAD-CAT-A007-4C01-04
- BEAD-CAT-A007-4C01-06
tool_budget:
  search: 3
  read: 16
  write: 12
  execute: 5
  max_runtime_minutes: 60
confidence:
  minimum: 70
  current: 80
  objective_clarity: 84
  scope_clarity: 82
  evidence_quality: 78
  reversibility: 95
  tool_fit: 83
  risk_awareness: 80
  testability: 80
risk_level: low
reversibility: high
stop_conditions:
- Findings engine or finding schema unavailable.
- Requested path outside allowed_paths.
- Agent trace ingestion would require a live LLM backend or secrets.
- Need for secret, credential, destructive action, or production access.
definition_of_done:
- agent_obs.py maps a local agent run trace into telemetry_envelope records and supports
  an agent-drift finding category.
- Three Mermaid diagrams render valid graph syntax for architecture flow, findings
  lifecycle, and drift detection.
- Both runbooks give step-by-step incident-to-finding and drift-review procedures
  referencing the engine and dispatch board.
- LOGHOUSE_DISPATCH_BOARD.md documents how dispatch_queue_item records route to CAT
  agent roles.
- The learning record captures decisions, what worked, risks, and follow-ups for MP-CAT-A007-4C01.
validation:
- type: mermaid_lint
  command: python -c "import glob; t=[open(p).read() for p in glob.glob('docs/architecture/loghouse/*.mmd')];
    assert t and all(s.strip() for s in t); print('loghouse mermaid present OK')"
  evidence_path: evidence/reports/MP-CAT-A007-4C01_mermaid.md
  required: true
required_output:
- updated_files
- validation_output
- next_recommended_bead
handoff:
  from: Orchestrator
  to: Scribe
  reviewer: Human Owner
  notes: Closeout and disclosure; agent actions must be observable like services.
    Learning record required for mission learned-state.

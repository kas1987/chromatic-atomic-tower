bead_id: BEAD-CAT-A011-4C01-02
mission_id: MP-CAT-A011-4C01
title: Implement trust scoring engine CLI
status: completed
agent_role: Builder
autonomy_level: L2
objective: "Implement scripts/cat_agent_scorecard.py with subcommands: score-bead\
  \ (record a completed/failed BEAD), penalize (apply incident penalty), promote (raise\
  \ trust level), demote (lower trust level), report (print per-agent summary). Scoring\
  \ formula: +5 completed, -10 failed, -15 incident (floor 40, promote \u2265 85,\
  \ demote \u2264 55). All mutations require --dry-run by default; --execute required\
  \ to write."
allowed_paths:
- scripts/cat_agent_scorecard.py
- agents/registry/AGENT_SCORECARD.yaml
- agents/scorecards/**
- tests/test_agent_scorecard.py
- tests/fixtures/scorecards/**
- evidence/scorecard/BEAD-CAT-A011-4C01-02_tests.json
forbidden_paths:
- .env
- .env.*
- secrets/**
- credentials/**
- infra/prod/**
- .git/**
- agents/registry/AGENT_REGISTRY.yaml
dependencies:
- BEAD-CAT-A011-4C01-01

  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- Script mutates AGENT_SCORECARD.yaml without --execute flag.
- Trust level changes without human review logged.
- Tests fail after implementation.
definition_of_done:
- scripts/cat_agent_scorecard.py implemented with all 5 subcommands.
- Dry-run mode is the default; --execute required for writes.
- tests/test_agent_scorecard.py covers score-bead, penalize, promote, demote, report.
- All new tests pass.
- Evidence JSON produced.
validation:
- type: tests
  command: python -m pytest -q tests/test_agent_scorecard.py
  evidence_path: evidence/scorecard/BEAD-CAT-A011-4C01-02_tests.json
  required: true
required_output:
- scoring_engine_script
- test_suite

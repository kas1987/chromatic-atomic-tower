autonomy_level: L2
objective: Confirm the pre-existing LOGHOUSE Phase-1 schemas (telemetry_envelope,
  finding, dependency_edge, deploy_event) and extend the contract set with dispatch_queue_item,
  architecture_rule, and drift_report schemas. Author the LOGHOUSE architecture and
  data-flow documents that map raw signals to evidence-backed findings and dispatch
  items.
allowed_paths:
- schemas/telemetry_envelope.schema.json
- schemas/finding.schema.json
- schemas/dependency_edge.schema.json
- schemas/deploy_event.schema.json
- schemas/dispatch_queue_item.schema.json
- schemas/architecture_rule.schema.json
- schemas/drift_report.schema.json
- docs/architecture/LOGHOUSE_ARCHITECTURE.md
- docs/architecture/LOGHOUSE_DATA_FLOW.md
- docs/operations/LOGHOUSE_FOUNDATION.md
- tests/test_loghouse_schemas.py
forbidden_paths:
- .env
- .env.*
- .venv/**
- secrets/**
- credentials/**
- infra/prod/**
- external_repos/**
dependencies: []
tool_budget:
  search: 2
  read: 12
  write: 10
  execute: 4
  max_runtime_minutes: 45

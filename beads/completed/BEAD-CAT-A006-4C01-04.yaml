bead_id: BEAD-CAT-A006-4C01-04
mission_id: MP-CAT-A006-4C01
title: Add skills registry and complexity-aware model routing
status: completed
agent_role: Orchestrator
autonomy_level: L2
objective: Add a machine-readable skill registry and fold complexity-aware (M1-M4
  / C1-C4) model routing with fallback and cost/risk controls into the existing agents/model_routes.yaml,
  and fold audit responsibilities into the existing agents/roles/*.md (no duplicate
  role files, no parallel routing file).
allowed_paths:
- agents/skills/**
- agents/roles/**
- agents/model_routes.yaml
- schemas/model_routing_policy.schema.json
- schemas/skill_registry.schema.json
forbidden_paths:
- .env
- .env.*
- .venv/**
- secrets/**
- credentials/**
- infra/prod/**
- external_repos/**
dependencies:
- BEAD-CAT-A006-4C01-01
assertions:
- completeness
- classification
- control_validation

stop_conditions:
- Registry audit fails after remediation attempts.
- Reconciliation check fails.
- GO resolver cannot identify next legal BEAD.
- Need to mutate secrets or production config.
definition_of_done:
- All validation commands pass.
- Reconciliation report exists under evidence/reconciliation/.
- GO resolver returns BEAD-CAT-A009-4C01-01 or next queued BEAD.
validation:
- type: registry_audit
  command: python scripts/cat_registry_audit.py --registry missions/registry/MISSION_REGISTRY.yaml
  evidence_path: evidence/reconciliation/reconciliation_report.md
  required: true
- type: reconciliation
  command: python scripts/cat_reconcile.py --target docs/reconciliation/LIVE_REPO_ALIGNMENT_TARGET.yaml
    --write-report
  evidence_path: evidence/reconciliation/reconciliation_report.json
  required: true
- type: alignment
  command: python scripts/cat_align_check.py --strict
  evidence_path: evidence/reports/MP-CAT-A009-4C01_alignment_check.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/MP-CAT-A009-4C01_tests.txt
  required: true
required_output:
- validation_summary
- evidence_paths
- next_recommended_action

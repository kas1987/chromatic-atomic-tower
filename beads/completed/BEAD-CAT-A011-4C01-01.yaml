bead_id: BEAD-CAT-A011-4C01-01
mission_id: MP-CAT-A011-4C01
title: Define agent scorecard schema and upgrade data model
status: completed
agent_role: Architect
autonomy_level: L2
objective: Create schemas/agent_scorecard.schema.json defining all scorecard fields
  (score, trust_level, completed_beads, failed_beads, incidents, history). Upgrade
  agents/registry/AGENT_SCORECARD.yaml from v0.0.0 to v1.0.0 with a history list.
  Create agents/scorecards/ directory with README.
allowed_paths:
- schemas/agent_scorecard.schema.json
- agents/registry/AGENT_SCORECARD.yaml
- agents/scorecards/README.md
- tests/fixtures/scorecards/valid_scorecard.yaml
- tests/fixtures/scorecards/invalid_scorecard.yaml
- evidence/scorecard/BEAD-CAT-A011-4C01-01_schema.json
forbidden_paths:
- .env
- .env.*
- secrets/**
- credentials/**
- infra/prod/**
- .git/**
- agents/registry/AGENT_REGISTRY.yaml
dependencies: []
tool_budget:
  search: 2
  read: 6
  write: 5
  execute: 2
  max_runtime_minutes: 30
confidence:
  minimum: 80
  current: 88
  objective_clarity: 92
  scope_clarity: 90
  evidence_quality: 85
  reversibility: 88
  tool_fit: 90
  risk_awareness: 85
  testability: 90
risk_level: low
reversibility: high
stop_conditions:
- Schema cannot be validated by cat_validate.py.
- AGENT_SCORECARD.yaml fails existing tests after upgrade.
- Forbidden path touched.
definition_of_done:
- schemas/agent_scorecard.schema.json created and validates.
- agents/registry/AGENT_SCORECARD.yaml upgraded to v1.0.0 with history field.
- agents/scorecards/README.md created.
- Test fixtures (valid + invalid scorecard) created.
- Evidence JSON produced at evidence/scorecard/BEAD-CAT-A011-4C01-01_schema.json.
validation:
- type: schema
  command: python scripts/cat_validate.py --file agents/registry/AGENT_SCORECARD.yaml
  evidence_path: evidence/scorecard/BEAD-CAT-A011-4C01-01_schema.json
  required: true
- type: tests
  command: python -m pytest -q tests/ -k "scorecard_schema"
  evidence_path: evidence/scorecard/BEAD-CAT-A011-4C01-01_tests.json
  required: false
required_output:
- agent_scorecard_schema
- upgraded_scorecard_data
- scorecards_directory

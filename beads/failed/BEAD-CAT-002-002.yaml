bead_id: BEAD-CAT-002-002
mission_id: MP-CAT-002
title: Implement evidence bundle CLI
status: archived
agent_role: Builder
autonomy_level: L3
objective: Implement cat_evidence.py so CAT can create and validate evidence bundles
  against schema and required artifact rules.
allowed_paths:
- scripts/cat_evidence.py
- schemas/evidence_bundle.schema.json
- evidence/bundles/**
- tests/test_evidence_gate.py
forbidden_paths:
- .env
- infra/prod/**
- secrets/**
- production/**
- deploy/**
dependencies:
- BEAD-CAT-002-001
tool_budget:
  search: 1
  read: 6
  write: 6
  execute: 4
  max_runtime_minutes: 35
confidence:
  minimum: 78
  current: 86
  objective_clarity: 90
  scope_clarity: 88
  evidence_quality: 84
  reversibility: 90
  tool_fit: 86
  risk_awareness: 84
  testability: 88
risk_level: medium
reversibility: high
stop_conditions:
- CLI writes outside evidence/bundles without explicit operator input.
- Bundle validation ignores missing required artifacts.
- Schema validation and artifact validation disagree.
- Tests fail for Sprint 002 scope.
definition_of_done:
- CLI can create a bundle.
- CLI can validate a bundle.
- Missing required artifact returns nonzero.
- Failed required validation returns nonzero.
validation:
- type: evidence_bundle
  command: python scripts/cat_evidence.py validate --bundle evidence/bundles/examples/EB-CAT-002-EXAMPLE.yaml
  evidence_path: evidence/reports/evidence_bundle_validation_sprint_002.md
  required: true
required_output:
- script_output
- validation_result
- next_recommended_bead
handoff:
  from: Orchestrator
  to: Builder
  reviewer: Reviewer
  notes: Do not mutate mission state from the evidence CLI.

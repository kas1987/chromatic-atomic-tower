bead_id: BEAD-CAT-003-001
title: Define CI governance rules and workflow
objective: Create the authoritative CI governance rules and GitHub Actions workflow
  that run CAT checks on pull requests and main branch pushes.
allowed_paths:
- gates/ci/**
- .github/workflows/cat-ci.yml
- docs/operations/CI_GOVERNANCE.md
- tests/test_ci_governance.py
stop_conditions:
- CI behavior would mutate truth-bearing evidence.
- Self-heal attempts to touch forbidden paths.
- PR scope behavior conflicts with BEAD allowed paths.
- Tests fail for reasons inside Sprint 003 scope.
definition_of_done:
- CI rules exist.
- GitHub workflow exists.
- Workflow includes CAT validation, local CI report, and tests.
- CI governance docs explain how to run checks.
validation:
- type: ci_local
  command: python scripts/cat_ci.py --mode local --write-report
  evidence_path: evidence/ci/reports/cat_ci_report.md
  required: true
- type: tests
  command: pytest -q
  evidence_path: evidence/test-results/sprint_003_ci_tests.txt
  required: true

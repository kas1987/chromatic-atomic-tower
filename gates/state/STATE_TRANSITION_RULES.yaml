version: 0.1.0
last_updated: '2026-06-17'
source_of_truth: gates/state/STATE_TRANSITION_RULES.yaml
principles:
- No lifecycle transition without a valid current state.
- No completion transition without evidence.
- Terminal states cannot be reopened without explicit human-gate override.
- Registry and tower state must be updated with the target contract.
- Dry-run should be used before applying high-risk transitions.
